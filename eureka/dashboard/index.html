<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eureka</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #e5e5e5; font-family: 'Inter', -apple-system, sans-serif; }

/* Tabs */
.tab-bar { display: flex; gap: 0; border-bottom: 1px solid #1f1f1f; background: #0a0a0a; position: sticky; top: 0; z-index: 100; }
.tab { padding: 12px 24px; cursor: pointer; color: #737373; font-size: 14px; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: #e5e5e5; }
.tab.active { color: #e5e5e5; border-bottom-color: #e5e5e5; }
.tab-content { display: none; padding: 24px; }
.tab-content.active { display: block; }

/* Cards */
.card { background: #141414; border: 1px solid #1f1f1f; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.card h3 { font-size: 14px; margin-bottom: 8px; line-height: 1.4; }
.card p { color: #737373; font-size: 13px; line-height: 1.5; }
.card .meta { display: flex; gap: 12px; margin-top: 8px; font-size: 12px; color: #737373; }

/* Badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-triangle { background: #6ba36820; color: #6ba368; }
.badge-v-structure { background: #c2707020; color: #c27070; }
.badge-bridge { background: #7a9cc620; color: #7a9cc6; }
.badge-walk { background: #c4956a20; color: #c4956a; }
.badge-other { background: #8a8a8a20; color: #8a8a8a; }

/* ELI5 */
.eli5 { background: #1a1a1a; border-left: 3px solid #c4956a; padding: 8px 12px; margin: 8px 0; font-size: 13px; color: #c4956a; }

/* Score */
.score { font-size: 24px; font-weight: 700; color: #e5e5e5; }
.score-label { font-size: 11px; color: #737373; text-transform: uppercase; letter-spacing: 1px; }

/* Search */
.search-input { width: 100%; padding: 12px 16px; background: #141414; border: 1px solid #1f1f1f; border-radius: 8px; color: #e5e5e5; font-size: 14px; outline: none; margin-bottom: 16px; }
.search-input:focus { border-color: #737373; }
.search-input::placeholder { color: #737373; }

/* Graph */
#graph-container { width: 100%; height: calc(100vh - 100px); }
#graph-container svg { width: 100%; height: 100%; }
.node-label { font-size: 10px; fill: #737373; pointer-events: none; }
.legend { position: absolute; bottom: 24px; left: 24px; background: #141414; border: 1px solid #1f1f1f; border-radius: 8px; padding: 12px; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.legend-shape { width: 12px; height: 12px; }

/* Review buttons */
.review-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn { padding: 8px 20px; border: 1px solid #1f1f1f; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; background: transparent; }
.btn-accept { color: #6ba368; border-color: #6ba368; }
.btn-accept:hover { background: #6ba36820; }
.btn-reject { color: #c27070; border-color: #c27070; }
.btn-reject:hover { background: #c2707020; }

/* Stats bar */
.stats-bar { display: flex; gap: 24px; padding: 16px 24px; border-bottom: 1px solid #1f1f1f; }
.stat { text-align: center; }
.stat-value { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 11px; color: #737373; text-transform: uppercase; letter-spacing: 1px; }

/* Filters */
.filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn { padding: 4px 12px; border: 1px solid #1f1f1f; border-radius: 16px; cursor: pointer; font-size: 12px; color: #737373; background: transparent; transition: all 0.2s; }
.filter-btn:hover, .filter-btn.active { color: #e5e5e5; border-color: #e5e5e5; }

/* Molecule grid */
.mol-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }

/* Atom pills */
.atom-pill { display: inline-block; padding: 2px 8px; margin: 2px; border-radius: 4px; font-size: 11px; background: #1f1f1f; color: #737373; }

/* Community colors */
.community-0 { color: #6ba368; } .community-1 { color: #c4956a; }
.community-2 { color: #7a9cc6; } .community-3 { color: #c27070; }
.community-4 { color: #9b8ec4; } .community-5 { color: #6ab0a3; }
.community-6 { color: #c4a74e; } .community-7 { color: #8a8a8a; }

/* Detail panel */
.detail-panel {
  position: fixed; right: 0; top: 0; width: 400px; height: 100vh;
  background: #141414; border-left: 1px solid #1f1f1f; padding: 24px;
  overflow-y: auto; z-index: 200; transform: translateX(100%);
  transition: transform 0.2s ease;
}
.detail-panel.open { transform: translateX(0); }
.detail-panel h2 { font-size: 16px; margin-bottom: 12px; line-height: 1.4; }
.detail-panel .body { color: #a3a3a3; font-size: 14px; line-height: 1.7; margin-bottom: 16px; }
.detail-panel .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.detail-panel .close-btn {
  position: absolute; top: 12px; right: 16px; cursor: pointer;
  color: #737373; font-size: 20px; background: none; border: none;
}
.detail-panel .close-btn:hover { color: #e5e5e5; }
.detail-panel .neighbors { margin-top: 16px; }
.detail-panel .neighbors h4 { font-size: 12px; color: #737373; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.detail-panel .neighbor-item { padding: 6px 0; font-size: 13px; color: #a3a3a3; border-bottom: 1px solid #1f1f1f; cursor: pointer; }
.detail-panel .neighbor-item:hover { color: #e5e5e5; }
</style>
</head>
<body>

<div class="stats-bar" id="stats-bar"></div>

<div class="tab-bar">
  <div class="tab active" data-tab="graph">Graph</div>
  <div class="tab" data-tab="search">Search</div>
  <div class="tab" data-tab="molecules">Molecules</div>
  <div class="tab" data-tab="review">Review</div>
</div>

<!-- Graph Tab -->
<div class="tab-content active" id="tab-graph">
  <div id="graph-container">
    <svg></svg>
  </div>
  <div class="legend" id="legend"></div>
</div>

<!-- Search Tab -->
<div class="tab-content" id="tab-search">
  <input type="text" class="search-input" id="search-input" placeholder="Search atoms by title, body, or tag..." autofocus>
  <div class="filters" id="tag-filters" style="margin-bottom:12px;"></div>
  <div id="search-results"></div>
</div>

<!-- Molecules Tab -->
<div class="tab-content" id="tab-molecules">
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
    <div class="filters" id="mol-filters" style="margin-bottom:0;flex:1;"></div>
    <div class="filters" id="mol-sort" style="margin-bottom:0;">
      <div class="filter-btn active" data-sort="score">Score</div>
      <div class="filter-btn" data-sort="newest">Newest</div>
      <div class="filter-btn" data-sort="alpha">A-Z</div>
      <div class="filter-btn" data-sort="shuffle">Shuffle</div>
    </div>
  </div>
  <div class="mol-grid" id="mol-grid"></div>
</div>

<!-- Review Tab -->
<div class="tab-content" id="tab-review">
  <div id="review-count" style="margin-bottom:16px; color:#737373; font-size:13px;"></div>
  <div id="review-cards"></div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <button class="close-btn" id="detail-close">&times;</button>
  <h2 id="detail-title"></h2>
  <div class="tags" id="detail-tags"></div>
  <div class="body" id="detail-body"></div>
  <div class="neighbors">
    <h4>Connected Atoms</h4>
    <div id="detail-neighbors"></div>
  </div>
</div>

<script>
const COLORS = ['#6ba368','#c4956a','#7a9cc6','#c27070','#9b8ec4','#6ab0a3','#c4a74e','#8a8a8a'];

// HTML escape to prevent XSS
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'graph') initGraph();
    if (tab.dataset.tab === 'molecules') loadMolecules();
    if (tab.dataset.tab === 'review') loadReview();
  });
});

// Stats
async function loadStats() {
  const data = await fetch('/api/stats').then(r => r.json());
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-value">${data.atoms||0}</div><div class="stat-label">Atoms</div></div>
    <div class="stat"><div class="stat-value">${data.molecules?.total||0}</div><div class="stat-label">Molecules</div></div>
    <div class="stat"><div class="stat-value">${data.sources||0}</div><div class="stat-label">Sources</div></div>
    <div class="stat"><div class="stat-value">${data.edges||0}</div><div class="stat-label">Edges</div></div>
    <div class="stat"><div class="stat-value">${data.molecules?.pending||0}</div><div class="stat-label">Pending</div></div>
  `;
}
loadStats();

// Graph
let graphInitialized = false;
async function initGraph() {
  if (graphInitialized) return;
  graphInitialized = true;
  const data = await fetch('/api/graph').then(r => r.json());
  const container = document.getElementById('graph-container');
  const width = container.clientWidth, height = container.clientHeight;
  const svg = d3.select('#graph-container svg').attr('viewBox', [0, 0, width, height]);

  // Zoom + pan
  const g = svg.append('g');
  svg.call(d3.zoom()
    .scaleExtent([0.1, 5])
    .on('zoom', (e) => g.attr('transform', e.transform)));

  const simulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.edges).id(d => d.slug).distance(80))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collision', d3.forceCollide(20));

  const link = g.append('g').selectAll('line').data(data.edges).join('line')
    .attr('stroke', '#1f1f1f').attr('stroke-width', 1);

  const node = g.append('g').selectAll('g').data(data.nodes).join('g')
    .call(d3.drag().on('start', dragstarted).on('drag', dragged).on('end', dragended));

  // Draw shapes based on type
  node.each(function(d) {
    const g = d3.select(this);
    const color = COLORS[d.community % COLORS.length] || COLORS[7];
    if (d.type === 'atom') {
      g.append('circle').attr('r', 6).attr('fill', color);
    } else if (d.method === 'triangle') {
      g.append('polygon').attr('points', '0,-8 7,5 -7,5').attr('fill', 'none').attr('stroke', color).attr('stroke-width', 2);
    } else if (d.method === 'v-structure') {
      g.append('text').text('V').attr('text-anchor', 'middle').attr('dy', 4).attr('fill', color).attr('font-size', 14).attr('font-weight', 700);
    } else {
      g.append('rect').attr('x', -5).attr('y', -5).attr('width', 10).attr('height', 10)
        .attr('transform', 'rotate(45)').attr('fill', color);
    }
  });

  // Labels — use title, cap at 40 chars
  node.append('text').text(d => {
    const t = d.title || d.slug.replace(/-/g, ' ');
    return t.length > 40 ? t.slice(0, 40) + '...' : t;
  }).attr('class', 'node-label').attr('dx', 12).attr('dy', 4);

  // Hover highlight
  node.on('mouseover', function(e, d) {
    const neighbors = new Set();
    data.edges.forEach(l => { if (l.source.slug===d.slug) neighbors.add(l.target.slug); if (l.target.slug===d.slug) neighbors.add(l.source.slug); });
    node.style('opacity', n => n.slug===d.slug || neighbors.has(n.slug) ? 1 : 0.15);
    link.style('opacity', l => l.source.slug===d.slug || l.target.slug===d.slug ? 1 : 0.05);
  }).on('mouseout', () => { node.style('opacity', 1); link.style('opacity', 1); });

  // Click — open detail panel
  node.on('click', (e, d) => {
    e.stopPropagation();
    openDetail(d.slug, data.edges);
  });

  simulation.on('tick', () => {
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  function dragstarted(e,d) { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
  function dragged(e,d) { d.fx=e.x; d.fy=e.y; }
  function dragended(e,d) { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }

  // Legend
  document.getElementById('legend').innerHTML = `
    <div class="legend-item"><svg width="12" height="12"><circle cx="6" cy="6" r="5" fill="#e5e5e5"/></svg> Atom</div>
    <div class="legend-item"><svg width="12" height="12"><polygon points="6,1 11,11 1,11" fill="none" stroke="#e5e5e5" stroke-width="1.5"/></svg> Triangle</div>
    <div class="legend-item"><svg width="12" height="12"><text x="6" y="10" text-anchor="middle" fill="#e5e5e5" font-size="11" font-weight="700">V</text></svg> V-structure</div>
    <div class="legend-item"><svg width="12" height="12"><rect x="2" y="2" width="8" height="8" transform="rotate(45,6,6)" fill="#e5e5e5"/></svg> Other molecule</div>
  `;
}
initGraph();

// Search
let searchTimeout;
let activeTag = '';
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  activeTag = '';
  document.querySelectorAll('#tag-filters .filter-btn').forEach(b => b.classList.remove('active'));
  const allBtn = document.querySelector('#tag-filters .filter-btn[data-tag=""]');
  if (allBtn) allBtn.classList.add('active');
  searchTimeout = setTimeout(() => doSearch(e.target.value), 300);
});

async function doSearch(q, tag) {
  let url = '/api/search?';
  if (tag) url += 'tag=' + encodeURIComponent(tag);
  else if (q && q.trim()) url += 'q=' + encodeURIComponent(q);

  const data = await fetch(url).then(r => r.json());

  // Render tag filters (once)
  if (data.tags && document.getElementById('tag-filters').children.length === 0) {
    document.getElementById('tag-filters').innerHTML =
      '<div class="filter-btn active" data-tag="">All</div>' +
      (data.tags||[]).map(t => `<div class="filter-btn" data-tag="${esc(t)}">${esc(t)}</div>`).join('');
    document.querySelectorAll('#tag-filters .filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#tag-filters .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTag = btn.dataset.tag;
        document.getElementById('search-input').value = '';
        doSearch('', activeTag);
      });
    });
  }

  document.getElementById('search-results').innerHTML = (data.results||[]).map(r => `
    <div class="card" style="cursor:pointer" data-slug="${esc(r.slug)}">
      <h3>${esc(r.title || r.slug.replace(/-/g, ' '))}</h3>
      <p>${esc(r.snippet || '')}${(r.snippet||'').length >= 200 ? '...' : ''}</p>
    </div>
  `).join('') || '<p style="color:#737373">No results</p>';

  // Click to open detail
  document.querySelectorAll('#search-results .card').forEach(card => {
    card.addEventListener('click', () => openDetail(card.dataset.slug));
  });
}
// Load all atoms + tags on first visit
doSearch('');

// Molecules
let currentMolSort = 'score';
let allMols = [];

async function loadMolecules() {
  const data = await fetch('/api/molecules').then(r => r.json());
  allMols = data.molecules || [];

  // Method filters
  const methods = [...new Set(allMols.map(m => m.method))];
  document.getElementById('mol-filters').innerHTML =
    '<div class="filter-btn active" data-method="all">All</div>' +
    methods.map(m => `<div class="filter-btn" data-method="${m}">${m}</div>`).join('');

  document.querySelectorAll('#mol-filters .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#mol-filters .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMolecules(allMols, btn.dataset.method, currentMolSort);
    });
  });

  // Sort buttons
  document.querySelectorAll('#mol-sort .filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#mol-sort .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentMolSort = btn.dataset.sort;
      const activeMethod = document.querySelector('#mol-filters .filter-btn.active')?.dataset.method || 'all';
      renderMolecules(allMols, activeMethod, currentMolSort);
    });
  });

  renderMolecules(allMols, 'all', currentMolSort);
}

function renderMolecules(mols, method, sort) {
  let filtered = method === 'all' ? [...mols] : mols.filter(m => m.method === method);

  if (sort === 'score') filtered.sort((a,b) => b.score - a.score);
  else if (sort === 'newest') filtered.sort((a,b) => (b.created_at||'').localeCompare(a.created_at||''));
  else if (sort === 'alpha') filtered.sort((a,b) => a.slug.localeCompare(b.slug));
  else if (sort === 'shuffle') filtered.sort(() => Math.random() - 0.5);

  document.getElementById('mol-grid').innerHTML = filtered.map(m => `
    <div class="card" style="cursor:pointer" data-mol-slug="${esc(m.slug)}">
      <div style="display:flex;justify-content:space-between;align-items:start;">
        <h3 style="flex:1;">${esc(m.slug.replace(/-/g, ' '))}</h3>
        <div><span class="score">${Math.round(m.score)}</span></div>
      </div>
      ${m.eli5 ? '<div class="eli5">' + esc(m.eli5) + '</div>' : ''}
      <div class="meta">
        <span class="badge badge-${m.method === 'v-structure' ? 'v-structure' : m.method === 'triangle' ? 'triangle' : 'other'}">${esc(m.method)}</span>
        <span>${esc(m.review_status)}</span>
      </div>
      <div class="mol-body" style="display:none; margin-top:12px; padding-top:12px; border-top:1px solid #1f1f1f;">
        <p style="white-space:pre-wrap; line-height:1.6;">${esc(m.body || '')}</p>
      </div>
    </div>
  `).join('') || '<p style="color:#737373">No molecules yet</p>';

  // Toggle body on click
  document.querySelectorAll('#mol-grid .card').forEach(card => {
    card.addEventListener('click', () => {
      const body = card.querySelector('.mol-body');
      body.style.display = body.style.display === 'none' ? 'block' : 'none';
    });
  });
}

// Review
async function loadReview() {
  const data = await fetch('/api/molecules').then(r => r.json());
  const pending = (data.molecules||[]).filter(m => m.review_status === 'pending');
  document.getElementById('review-count').textContent = `${pending.length} pending review`;
  document.getElementById('review-cards').innerHTML = pending.map(m => {
    const safeSlug = esc(m.slug);
    return `
    <div class="card" id="review-${safeSlug}" data-slug="${safeSlug}">
      <h3>${esc(m.slug.replace(/-/g, ' '))}</h3>
      ${m.eli5 ? '<div class="eli5">' + esc(m.eli5) + '</div>' : ''}
      <p>${esc(m.body||'')}</p>
      <div class="meta">
        <span class="badge badge-${m.method === 'v-structure' ? 'v-structure' : m.method === 'triangle' ? 'triangle' : 'other'}">${esc(m.method)}</span>
        <span>Score: ${Math.round(m.score)}</span>
      </div>
      <div class="review-actions">
        <button class="btn" style="color:#737373;border-color:#737373;" data-action="skip" data-slug="${safeSlug}">I already know this (s)</button>
        <button class="btn btn-accept" data-action="yes" data-slug="${safeSlug}">New &amp; interesting (y)</button>
        <button class="btn btn-reject" data-action="no" data-slug="${safeSlug}">Doesn't excite me (n)</button>
      </div>
    </div>`;
  }).join('') || '<p style="color:#737373">Nothing to review</p>';

  // Bind review buttons via data attributes instead of inline onclick
  document.querySelectorAll('#review-cards .btn').forEach(btn => {
    btn.addEventListener('click', () => reviewMolecule(btn.dataset.slug, btn.dataset.action));
  });
}

let currentReviewIndex = 0;
document.addEventListener('keydown', e => {
  if (document.querySelector('#tab-review.active')) {
    const cards = document.querySelectorAll('#review-cards .card');
    if (cards.length === 0) return;
    const slug = cards[currentReviewIndex]?.dataset.slug;
    if (!slug) return;
    if (e.key === 'y') reviewMolecule(slug, 'yes');
    if (e.key === 'n') reviewMolecule(slug, 'no');
    if (e.key === 's') reviewMolecule(slug, 'skip');
    if (e.key === 'ArrowDown') { currentReviewIndex = Math.min(currentReviewIndex+1, cards.length-1); cards[currentReviewIndex].scrollIntoView({behavior:'smooth'}); }
    if (e.key === 'ArrowUp') { currentReviewIndex = Math.max(currentReviewIndex-1, 0); cards[currentReviewIndex].scrollIntoView({behavior:'smooth'}); }
  }
});

async function reviewMolecule(slug, decision) {
  await fetch('/api/review/' + slug, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({decision})
  });
  document.getElementById('review-' + slug)?.remove();
  const remaining = document.querySelectorAll('#review-cards .card').length;
  document.getElementById('review-count').textContent = `${remaining} pending review`;
  loadStats();
}

// Detail panel
const detailPanel = document.getElementById('detail-panel');
document.getElementById('detail-close').addEventListener('click', () => detailPanel.classList.remove('open'));
document.addEventListener('click', (e) => {
  if (!detailPanel.contains(e.target)) detailPanel.classList.remove('open');
});

async function openDetail(slug, edges) {
  const data = await fetch('/api/atom/' + encodeURIComponent(slug)).then(r => r.json());
  if (data.error) return;

  document.getElementById('detail-title').textContent = data.title || slug.replace(/-/g, ' ');

  let bodyHtml = esc(data.body || '');
  if (data.type === 'molecule') {
    bodyHtml = (data.eli5 ? '<div class="eli5">' + esc(data.eli5) + '</div>' : '')
      + '<p style="margin-top:12px;white-space:pre-wrap;">' + esc(data.body || '') + '</p>'
      + '<div class="meta" style="margin-top:8px;"><span class="badge badge-' + (data.method === 'triangle' ? 'triangle' : data.method === 'v-structure' ? 'v-structure' : 'other') + '">' + esc(data.method || '') + '</span>'
      + '<span>Score: ' + Math.round(data.score || 0) + '</span></div>';
  }
  document.getElementById('detail-body').innerHTML = data.type === 'molecule' ? bodyHtml : '<p>' + bodyHtml + '</p>';

  document.getElementById('detail-tags').innerHTML = (data.tags || [])
    .map(t => '<span class="atom-pill">' + esc(t) + '</span>').join('');

  // Find neighbors from edges
  const neighbors = new Set();
  (edges || []).forEach(e => {
    const s = typeof e.source === 'object' ? e.source.slug : e.source;
    const t = typeof e.target === 'object' ? e.target.slug : e.target;
    if (s === slug) neighbors.add(t);
    if (t === slug) neighbors.add(s);
  });

  document.getElementById('detail-neighbors').innerHTML = [...neighbors]
    .map(n => `<div class="neighbor-item" data-slug="${esc(n)}">${esc(n.replace(/-/g, ' '))}</div>`)
    .join('') || '<p style="color:#737373;font-size:13px">No connections</p>';

  // Click neighbor to navigate
  document.querySelectorAll('#detail-neighbors .neighbor-item').forEach(item => {
    item.addEventListener('click', () => openDetail(item.dataset.slug, edges));
  });

  detailPanel.classList.add('open');
}
</script>
</body>
</html>
